name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node
          config-file: .release-please-config.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run TypeScript compiler
        run: pnpm build

      - name: Build extension
        run: pnpm build:production

      - name: Setup virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run tests
        run: xvfb-run -a pnpm test

      - name: Package extension
        run: pnpm vsce:package

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if npx @vscode/vsce show ukaisi.inspect-ai --json 2>/dev/null | grep -q '"version": "${{ steps.version.outputs.version }}"'; then
            echo "v${{ steps.version.outputs.version }} already published to VS Code Marketplace, skipping"
          else
            pnpm vsce publish --no-dependencies --pat "$VSCE_PAT"
          fi

      - name: Publish to OpenVSIX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npm install -g ovsx
          if ovsx get ukaisi.inspect-ai --metadata 2>/dev/null | grep -q '"version": "${{ steps.version.outputs.version }}"'; then
            echo "v${{ steps.version.outputs.version }} already published to OpenVSIX, skipping"
          else
            ovsx publish *.vsix --pat "$OVSX_PAT"
          fi

      - name: Upload VSIX to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} *.vsix --clobber
