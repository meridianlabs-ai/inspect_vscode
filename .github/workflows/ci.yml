name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Run TypeScript compiler
        run: pnpm build

      - name: Build extension
        run: pnpm build:production

      # VS Code's test runner needs a display. On Linux we provide a virtual
      # one via xvfb; the Windows runner already has a display.
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a pnpm test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pnpm test

      - name: Package extension
        run: pnpm vsce:package

      - name: Upload extension artifact
        # Only one OS needs to publish the .vsix artifact.
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: "*.vsix"
